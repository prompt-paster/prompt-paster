<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Prompt Paster overlay preview</title>
  <desc id="desc">A stylized preview of Prompt Paster as a macOS menu-bar utility with a searchable prompt overlay.</desc>
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="0.48" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#e8fff5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.24"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="760" fill="url(#wallpaper)"/>

  <rect x="0" y="0" width="1280" height="42" fill="#fbfbfd" opacity="0.96"/>
  <text x="24" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#111827">Prompt Paster</text>
  <text x="1010" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#374151">⌃⌥ Space</text>
  <circle cx="1138" cy="21" r="7" fill="#16a34a"/>
  <text x="1155" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#374151">Ready</text>
  <text x="1216" y="27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#111827">09:41</text>

  <g filter="url(#smallShadow)">
    <rect x="934" y="54" width="250" height="146" rx="16" fill="#ffffff"/>
    <path d="M1035 54 L1051 36 L1067 54" fill="#ffffff"/>
    <text x="958" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#111827">Prompt Paster</text>
    <text x="958" y="116" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#4b5563">Open Overlay</text>
    <text x="958" y="144" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#4b5563">Settings...</text>
    <line x1="958" y1="158" x2="1160" y2="158" stroke="#e5e7eb"/>
    <text x="958" y="184" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#6b7280">Quit</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="285" y="146" width="710" height="500" rx="26" fill="#101827"/>
    <rect x="285" y="146" width="710" height="500" rx="26" fill="#0f172a" opacity="0.96"/>
    <rect x="317" y="180" width="646" height="58" rx="14" fill="#ffffff"/>
    <text x="343" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#111827">handoff release notes</text>
    <text x="902" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#6b7280">⌘K</text>

    <text x="321" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" letter-spacing="1" fill="#93c5fd">MATCHING PROMPTS</text>

    <rect x="317" y="292" width="646" height="82" rx="16" fill="#2563eb"/>
    <text x="343" y="324" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#ffffff">PR handoff summary</text>
    <text x="343" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#dbeafe">Summarize scope, validation, risks, and follow-up work for reviewers.</text>
    <text x="896" y="345" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#dbeafe">Return</text>

    <rect x="317" y="388" width="646" height="72" rx="14" fill="#1f2937"/>
    <text x="343" y="417" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#f9fafb">Release checklist</text>
    <text x="343" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#cbd5e1">Build, sign, package, smoke test, tag, and publish.</text>

    <rect x="317" y="474" width="646" height="72" rx="14" fill="#1f2937"/>
    <text x="343" y="503" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#f9fafb">Reviewer response</text>
    <text x="343" y="526" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#cbd5e1">Address comments, explain tradeoffs, and keep the thread concise.</text>

    <text x="321" y="594" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">Select a prompt to copy it to the clipboard, then paste anywhere.</text>
    <text x="833" y="594" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">Esc to close</text>
  </g>
</svg>
